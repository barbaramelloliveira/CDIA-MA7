name: CI - Bella Tavola

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:

  smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ✅ CACHE AQUI (ANTES DOS TESTES)
      - name: Cache Hugging Face
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-py3.12-fraud-detector-v1

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes SMOKE
        run: PYTHONPATH=. pytest FastAPI/tests -m smoke -v


  full-tests:
    runs-on: ubuntu-latest
    needs: smoke-tests

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ✅ CACHE AQUI TAMBÉM
      - name: Cache Hugging Face
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-py3.12-fraud-detector-v1

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar TODOS os testes
        run: PYTHONPATH=. pytest FastAPI/tests -v