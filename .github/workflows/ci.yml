name: CI — Bella Tavola

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verificar-sintaxe:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install autoflake black

      - name: Verificar imports não utilizados
        run: |
          autoflake --check --remove-all-unused-imports -r .

      - name: Verificar formatação
        run: |
          black --check .

  verificar-api:
    runs-on: ubuntu-latest
    needs: verificar-sintaxe

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Iniciar a API em background
        run: |
          uvicorn FastAPI.main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Verificar que a API responde
        run: |
          curl --fail http://localhost:8000/ml/health
          echo "API respondeu com sucesso"

      - name: Rodar API
        run: |
        uvicorn FastAPI.main:app --host 0.0.0.0 --port 8000 &
        sleep 5
        
      - name: Testar endpoint
        run: |
          curl --fail http://localhost:8000/ml/health
          echo "API respondeu com sucesso"