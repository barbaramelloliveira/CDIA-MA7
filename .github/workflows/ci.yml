name: CI — Bella Tavola

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verificar-sintaxe:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar ferramentas de qualidade
        run: |
          pip install --upgrade pip
          pip install black autoflake

      - name: Verificar imports não utilizados
        run: autoflake --check --remove-all-unused-imports -r . || true

      - name: Verificar formatação (black)
        run: black --check .

  testes:
    runs-on: ubuntu-latest
    needs: verificar-sintaxe

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pytest
          pip install -r requirements.txt

      - name: Rodar testes
        run: pytest FastAPI/tests/ -v --tb=short